services:
  postgres:
    image: postgres:16-alpine
    container_name: ontimecrm_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ontimecrm
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ontimecrm_api
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=ontimecrm;Username=postgres;Password=postgres"
      Jwt__Key: "dev-secret-key-minimum-32-characters-long!!"
      Jwt__Issuer: OnTimeCRM
      Jwt__Audience: OnTimeCRM-Frontend
      Jwt__ExpirationMinutes: "480"
      Cors__AllowedOrigins__0: "http://localhost:5173"
      AdminBootstrap__Email: "admin@ontimecrm.io"
      AdminBootstrap__Password: "Admin123!"
      AdminBootstrap__FullName: "Administrador"
      AdminBootstrap__CompanyName: "OnTimeCRM Demo"
      AdminBootstrap__BrandName: "Stand Demo"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
